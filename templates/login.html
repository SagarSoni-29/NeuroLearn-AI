<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="login-body">

<div class="animated-bg"></div>

<div class="login-container">

    <div class="login-left">

        <h1> NeuroLearn AI</h1>

        <p>
            Personalized AI Learning Companion
        </p>

    </div>

    <div class="login-right">

        <h2>Welcome Back</h2>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>

</body>

</html>
